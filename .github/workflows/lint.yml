name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    # Static checks only — scripts target macOS at runtime, but shellcheck,
    # python ast.parse, and json.tool are all platform-agnostic.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify shellcheck is available
        run: shellcheck --version

      - name: Shellcheck verification scripts
        # -x follows sourced files; SC1091 silenced for any source-not-found.
        run: shellcheck -x -e SC1091 Verification/scripts/*.sh

      - name: Validate target JSON files parse
        run: |
          for f in targets/*.json; do
            python3 -m json.tool "$f" >/dev/null
          done

      - name: Syntax-check Python heredocs
        # Each script may contain one or more `python3 - <<'PYEOF' … PYEOF` blocks.
        # Extract them with awk and run ast.parse — catches Python syntax errors
        # without executing macOS-only side effects (system_profiler, ioreg, etc.).
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          for s in Verification/scripts/*.sh; do
            awk -v out="$tmp/$(basename "$s")" '
              /<<'\''PYEOF'\''/ { n++; f=sprintf("%s.%d.py", out, n); inblk=1; next }
              inblk && /^PYEOF$/ { inblk=0; next }
              inblk { print > f }
            ' "$s"
          done
          shopt -s nullglob
          for py in "$tmp"/*.py; do
            echo "ast.parse: $py"
            python3 -c "import ast,sys; ast.parse(open(sys.argv[1]).read())" "$py"
          done

      - name: Verify markdown links resolve to existing files
        # Scan all in-repo markdown for ](relative/path) links and check each
        # exists on disk. Skips http(s)://, mailto:, and #anchor-only refs.
        # URL-decodes %20 etc. so links to files with spaces resolve correctly.
        run: |
          set -euo pipefail
          rc=0
          # Find every .md in the repo, except inside .git or build artifacts.
          while IFS= read -r md; do
            base_dir=$(dirname "$md")
            # `grep ... || true` — files without any markdown links (e.g. PR
            # template, sometimes a CHANGELOG) make grep exit 1, which combined
            # with `set -o pipefail` would abort the whole step.
            { grep -oE '\]\([^)]+\)' "$md" || true; } | sed -E 's/^\]\(([^)]+)\)$/\1/' \
              | while IFS= read -r link; do
                  case "$link" in
                    http://*|https://*|mailto:*|\#*) continue ;;
                  esac
                  # Strip any #anchor or ?query suffix
                  path="${link%%#*}"; path="${path%%\?*}"
                  [ -z "$path" ] && continue
                  # URL-decode %20 etc. (cheap inline decode for the common cases)
                  decoded=$(printf '%b' "${path//%/\\x}")
                  # Resolve relative to the markdown file's directory.
                  case "$decoded" in
                    /*) candidate="$decoded" ;;
                    *)  candidate="$base_dir/$decoded" ;;
                  esac
                  if [ ! -e "$candidate" ]; then
                    echo "BROKEN LINK in $md → $link (resolved to $candidate)" >&2
                    exit 1
                  fi
                done || rc=1
          done < <(find . -name '*.md' -not -path './.git/*' -not -path './node_modules/*')
          exit $rc
