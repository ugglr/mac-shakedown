name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    # Static checks only — scripts target macOS at runtime, but shellcheck,
    # python ast.parse, and json.tool are all platform-agnostic.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify shellcheck is available
        run: shellcheck --version

      - name: Shellcheck verification scripts
        # -x follows sourced files; SC1091 silenced for any source-not-found.
        run: shellcheck -x -e SC1091 Verification/scripts/*.sh

      - name: Validate target JSON files parse
        run: |
          for f in targets/*.json; do
            python3 -m json.tool "$f" >/dev/null
          done

      - name: Syntax-check Python heredocs
        # Each script may contain one or more `python3 - <<'PYEOF' … PYEOF` blocks.
        # Extract them with awk and run ast.parse — catches Python syntax errors
        # without executing macOS-only side effects (system_profiler, ioreg, etc.).
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          for s in Verification/scripts/*.sh; do
            awk -v out="$tmp/$(basename "$s")" '
              /<<'\''PYEOF'\''/ { n++; f=sprintf("%s.%d.py", out, n); inblk=1; next }
              inblk && /^PYEOF$/ { inblk=0; next }
              inblk { print > f }
            ' "$s"
          done
          shopt -s nullglob
          for py in "$tmp"/*.py; do
            echo "ast.parse: $py"
            python3 -c "import ast,sys; ast.parse(open(sys.argv[1]).read())" "$py"
          done

      - name: Verify markdown links resolve to existing files
        # Walk every in-repo .md, parse ](relative/path) links, confirm each
        # resolves to a file on disk. Skips http(s)://, mailto:, and
        # #anchor-only refs. URL-decodes %20 etc. so links to files with
        # spaces resolve correctly.
        #
        # Implemented in Python instead of bash because the previous bash
        # version used `${path//%/\\x}` parameter-expansion escapes that
        # behave differently in zsh — false positives for contributors
        # running this check locally on default-shell macOS.
        run: |
          python3 <<'PYEOF'
          import os
          import re
          import sys
          import urllib.parse

          SKIP_PREFIXES = ("http://", "https://", "mailto:", "#")
          SKIP_DIRS = {".git", "node_modules", ".claude"}
          LINK_RE = re.compile(r"\]\(([^)]+)\)")

          broken = []
          for dirpath, dirnames, filenames in os.walk("."):
              dirnames[:] = [d for d in dirnames if d not in SKIP_DIRS]
              for fname in filenames:
                  if not fname.endswith(".md"):
                      continue
                  md_path = os.path.join(dirpath, fname)
                  base_dir = os.path.dirname(md_path)
                  with open(md_path, encoding="utf-8", errors="ignore") as f:
                      content = f.read()
                  for m in LINK_RE.finditer(content):
                      link = m.group(1)
                      if link.startswith(SKIP_PREFIXES):
                          continue
                      path = link.split("#", 1)[0].split("?", 1)[0]
                      if not path:
                          continue
                      decoded = urllib.parse.unquote(path)
                      if decoded.startswith("/"):
                          candidate = decoded
                      else:
                          candidate = os.path.normpath(os.path.join(base_dir, decoded))
                      if not os.path.exists(candidate):
                          broken.append((md_path, link, candidate))

          if broken:
              for md, link, candidate in broken:
                  print(f"BROKEN LINK in {md} → {link} (resolved to {candidate})",
                        file=sys.stderr)
              sys.exit(1)
          PYEOF
